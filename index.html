<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Andrew 530</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f7f5;
      color: #202124;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      margin: 1rem 0 0;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #5f6368;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #101114;
        color: #f5f5f5;
      }

      p {
        color: #b8babf;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Coming Soon</h1>
    <p>Andrew 530.github.io</p>
  </main>
</body>
</html>
